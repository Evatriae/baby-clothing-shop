<ion-content>
  <div class="login-wrapper">
    <div class="login-box">
      <div class="brand">
        <div class="brand-icon">
          <ion-icon name="lock-closed-outline"></ion-icon>
        </div>
        <h1>Admin Portal</h1>
        <p class="brand-sub">Baby Clothing Shop</p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <ion-icon name="mail-outline" class="field-icon"></ion-icon>
          <ion-input
            type="email"
            [(ngModel)]="email"
            placeholder="admin@babyshop.com"
            class="styled-input">
          </ion-input>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <ion-icon name="lock-closed-outline" class="field-icon"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="••••••••"
            class="styled-input">
          </ion-input>
          <ion-icon
            [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
            class="eye-icon"
            (click)="togglePassword()">
          </ion-icon>
        </div>
      </div>

      <div *ngIf="errorMsg" class="error-banner">
        {{ errorMsg }}
      </div>

      <ion-button
        expand="block"
        class="login-btn"
        [disabled]="isLoading"
        (click)="onLogin()">
        {{ isLoading ? 'Authenticating...' : 'Sign In' }}
      </ion-button>

      <p class="hint">Default: admin&#64;babyshop.com / Admin&#64;12345</p>
    </div>
  </div>
</ion-content>
